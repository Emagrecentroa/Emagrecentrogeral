<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body { font-family: 'Jost', sans-serif; background: #f0ebe4; min-height: 100vh; padding: 0 0 60px; color: #1a1a1a; }

  .header { background: #1a1a1a; padding: 18px 20px 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .clinic-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #f5efe8; line-height: 1.2; }
  .clinic-sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #b8a898; margin-top: 4px; font-weight: 300; }
  .header-right { text-align: right; flex-shrink: 0; }
  .doc-title { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #c9a97a; }
  .doc-num { font-size: 11px; color: #888; margin-top: 2px; }
  .doc-vendedor { font-size: 11px; color: #b8a898; margin-top: 3px; font-weight: 300; }

  .meta-section { background: #faf8f5; padding: 16px 20px; border-bottom: 1px solid #e0d8ce; display: flex; flex-direction: column; gap: 14px; }
  .meta-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .meta-field { display: flex; flex-direction: column; gap: 5px; }
  .meta-field label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #999; font-weight: 500; }
  .meta-field input {
    font-family: 'Jost', sans-serif; font-size: 16px; background: transparent;
    border: none; border-bottom: 1.5px solid #ccc; padding: 6px 0; color: #1a1a1a;
    outline: none; width: 100%; border-radius: 0;
  }
  .meta-field input:focus { border-bottom-color: #c9a97a; }

  .body { padding: 0; }
  .section-header { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: #999; padding: 16px 20px 10px; background: #f0ebe4; font-weight: 500; }

  .category-block { background: #fff; margin-bottom: 10px; }
  .category-name {
    font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600;
    letter-spacing: 1.5px; color: #555; text-transform: uppercase;
    padding: 14px 20px 10px; border-bottom: 1px solid #f0ece6;
    display: flex; align-items: center; gap: 10px;
  }
  .category-name::after { content: ''; flex: 1; height: 1px; background: #e8e0d5; }
  .pkg-note { font-size: 12px; color: #bbb; font-style: italic; padding: 6px 20px 4px; background: #fdfcfa; border-bottom: 1px solid #f5f0ea; }

  .proc-row { padding: 14px 20px; border-bottom: 1px solid #f5f0ea; }
  .proc-row:last-child { border-bottom: none; }
  .proc-top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }

  .proc-check {
    width: 22px; height: 22px; min-width: 22px;
    border: 1.5px solid #ccc; border-radius: 5px; cursor: pointer;
    appearance: none; -webkit-appearance: none; position: relative; background: #fff;
  }
  .proc-check:checked { background: #1a1a1a; border-color: #1a1a1a; }
  .proc-check:checked::after {
    content: ''; position: absolute; left: 6px; top: 2px;
    width: 7px; height: 12px; border: 2px solid #f5efe8;
    border-top: none; border-left: none; transform: rotate(40deg);
  }

  .proc-name { font-size: 17px; color: #1a1a1a; font-weight: 400; flex: 1; line-height: 1.3; }

  .sessoes-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .sessoes-label { font-size: 12px; color: #aaa; font-weight: 500; white-space: nowrap; }
  .sessoes-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .sess-btn {
    font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 500;
    padding: 6px 14px; border: 1.5px solid #ddd; border-radius: 25px;
    background: transparent; color: #888; cursor: pointer; min-width: 48px; text-align: center;
  }
  .sess-btn.active { background: #1a1a1a; color: #f5efe8; border-color: #1a1a1a; }

  /* Tirzepatida: preço fixo, sem sessões */
  .tirz-prices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
  .tirz-price-note { font-size: 12px; color: #aaa; padding-left: 36px; }

  .pkg-options { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
  .pkg-pill { font-size: 13px; color: #777; padding: 6px 14px; border: 1.5px solid #ddd; border-radius: 25px; cursor: pointer; user-select: none; white-space: nowrap; font-weight: 400; }
  .pkg-pill.active { background: #1a1a1a; color: #f5efe8; border-color: #1a1a1a; }

  .internal-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .internal-badge { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; padding: 2px 7px; border: 1px dashed #ccc; border-radius: 10px; }
  .int-pill { font-size: 13px; padding: 6px 14px; border-radius: 25px; cursor: pointer; user-select: none; white-space: nowrap; font-weight: 400; border: 1.5px dashed #ccc; color: #aaa; background: transparent; }
  .int-pill.desconto { border-color: #e0a060; color: #c07030; }
  .int-pill.desconto.active { background: #c07030; color: #fff; border-style: solid; }
  .int-pill.gerente { border-color: #c06060; color: #a03030; }
  .int-pill.gerente.active { background: #a03030; color: #fff; border-style: solid; }

  .preco-calc { font-size: 13px; color: #c9a97a; font-weight: 500; margin-top: 8px; min-height: 18px; padding-left: 36px; }

  .totals-section { background: #fff; margin: 10px 0; padding: 20px; }
  .obs-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #999; margin-bottom: 8px; font-weight: 500; }
  .obs-textarea { width: 100%; font-family: 'Jost', sans-serif; font-size: 15px; background: #faf8f5; border: 1.5px solid #e0d8ce; border-radius: 8px; padding: 12px 14px; color: #1a1a1a; resize: none; outline: none; line-height: 1.5; margin-bottom: 16px; }
  .obs-textarea:focus { border-color: #c9a97a; }

  .economia-label { color: #2a9d4a !important; font-size: 14px; }
  .economia-val { color: #2a9d4a !important; font-weight: 600; font-size: 15px; }

  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 15px; }
  .total-row.main { border-top: 1.5px solid #e0d8ce; margin-top: 10px; padding-top: 14px; font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; }
  .total-label { color: #888; }
  .total-val { color: #1a1a1a; font-weight: 500; }
  .total-row.main .total-val { font-size: 28px; }

  .footer-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .btn {
    font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 16px 20px; border-radius: 10px; cursor: pointer;
    border: 1.5px solid #ccc; background: transparent; color: #1a1a1a;
    text-align: center; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;
  }
  .btn:active { opacity: 0.75; transform: scale(0.98); }
  .btn.primary { background: #1a1a1a; color: #f5efe8; border-color: #1a1a1a; }
  .btn.whatsapp { background: #25D366; color: #fff; border-color: #25D366; font-size: 16px; }
  .btn.whatsapp svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
  .btn.danger { border-color: #e0b0a0; color: #b05030; font-size: 14px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 18px; }
  .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; margin-bottom: 14px; color: #1a1a1a; }
  .modal pre { font-family: 'Jost', sans-serif; font-size: 14px; line-height: 1.75; white-space: pre-wrap; color: #333; background: #faf8f5; border-radius: 10px; padding: 16px; margin-bottom: 18px; }
  .modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .modal-actions .btn { font-size: 14px; padding: 14px; }

  @media print {
    body { background: white; padding: 0; }
    .footer-actions, .modal-overlay, .sessoes-row, .pkg-options, .internal-row, .internal-badge, .section-header { display: none !important; }
    .category-block, .totals-section { margin: 0; box-shadow: none; }

<body>

const SESSOES_OPTS = [5, 10, 15, 20];
const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const state = {};

function calcTotalSessoes(pkg, sessoes) {
  if (!pkg.parcBase) return null;
  const mult = sessoes / 5;
  const parcela = +(pkg.parcBase * mult).toFixed(2);
  const total = +(parcela * pkg.nParcelas).toFixed(2);
  return { parcela, total, nParcelas: pkg.nParcelas };
}

function updatePrecoDisplay(key) {
  const s = state[key];
  const el = document.getElementById('preco-' + key);
  if (!el) return;

  const [ci, ii] = key.split('-').map(Number);
  const cat = CATS[ci];

  if (cat.tipo === 'fixo') {
    const pkg = cat.items[ii].pkgs[s.pkgIdx];
    if (pkg.total == null) { el.textContent = ''; return; }
    el.textContent = `4 aplicações — ${fmt(pkg.total)}`;
  } else {
    const pkg = cat.pkgs[s.pkgIdx];
    if (!pkg.parcBase) { el.textContent = ''; return; }
    const r = calcTotalSessoes(pkg, s.sessoes);
    el.textContent = `${s.sessoes} sessões · ${r.nParcelas}x ${fmt(r.parcela)} = ${fmt(r.total)}`;
  }
}

function buildPills(allPills, pkgList, key, pkgOpts, intRow) {
  pkgList.forEach((pkg, pi) => {
    const pill = document.createElement('span');
    if (pkg.interno) {
      pill.className = `int-pill ${pkg.tipoInterno}`;
      pill.textContent = pkg.label;
      intRow.appendChild(pill);
    } else {
      pill.className = 'pkg-pill' + (pi === 0 ? ' active' : '');
      pill.textContent = pkg.label;
      pkgOpts.appendChild(pill);
    }
    allPills.push(pill);
    pill.addEventListener('click', () => {
      state[key].pkgIdx = pi;
      allPills.forEach((p, i) => p.classList.toggle('active', i === pi));
      updatePrecoDisplay(key);
      recalc();
    });
  });
}

function buildList() {
  const cont = document.getElementById('procedures-list');
  CATS.forEach((cat, ci) => {
    const wrap = document.createElement('div');
    wrap.className = 'category-block';
    wrap.innerHTML =
      `<div class="category-name">${cat.cat}</div>` +
      (cat.note ? `<div class="pkg-note">${cat.note}</div>` : '');

    cat.items.forEach((item, ii) => {
      const key = ci + '-' + ii;
      state[key] = { checked: false, pkgIdx: 0, sessoes: 5 };

      const row = document.createElement('div');
      row.className = 'proc-row';

      const top = document.createElement('div');
      top.className = 'proc-top';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'proc-check';
      cb.addEventListener('change', () => { state[key].checked = cb.checked; recalc(); });
      const nameSpan = document.createElement('span');
      nameSpan.className = 'proc-name';
      nameSpan.textContent = item.nome;
      top.appendChild(cb); top.appendChild(nameSpan);
      row.appendChild(top);

      const pkgOpts = document.createElement('div');
      pkgOpts.className = 'pkg-options';
      const intRow = document.createElement('div');
      intRow.className = 'internal-row';
      const allPills = [];

      if (cat.tipo === 'sessoes') {
        // Botões de sessões
        const sessRow = document.createElement('div');
        sessRow.className = 'sessoes-row';
        sessRow.innerHTML = `<span class="sessoes-label">Sessões:</span>`;
        const sessWrap = document.createElement('div');
        sessWrap.className = 'sessoes-btns';
        SESSOES_OPTS.forEach(n => {
          const btn = document.createElement('button');
          btn.className = 'sess-btn' + (n === 5 ? ' active' : '');
          btn.textContent = n;
          btn.addEventListener('click', () => {
            state[key].sessoes = n;
            sessWrap.querySelectorAll('.sess-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === n));
            updatePrecoDisplay(key); recalc();
          });
          sessWrap.appendChild(btn);
        });
        sessRow.appendChild(sessWrap);
        row.appendChild(sessRow);

        const hasInternal = cat.pkgs.some(p => p.interno);
        if (hasInternal) {
          const badge = document.createElement('span');
          badge.className = 'internal-badge'; badge.textContent = 'interno';
          intRow.appendChild(badge);
        }
        buildPills(allPills, cat.pkgs, key, pkgOpts, intRow);

      } else {
        // Fixo (tirzepatida) — sem sessões
        const hasInternal = item.pkgs.some(p => p.interno);
        if (hasInternal) {
          const badge = document.createElement('span');
          badge.className = 'internal-badge'; badge.textContent = 'interno';
          intRow.appendChild(badge);
        }
        buildPills(allPills, item.pkgs, key, pkgOpts, intRow);
      }

      row.appendChild(pkgOpts);
      const hasInt = cat.tipo === 'fixo'
        ? item.pkgs.some(p => p.interno)
        : cat.pkgs.some(p => p.interno);
      if (hasInt) row.appendChild(intRow);

      const precoEl = document.createElement('div');
      precoEl.className = 'preco-calc'; precoEl.id = 'preco-' + key;
      row.appendChild(precoEl);

      wrap.appendChild(row);
      updatePrecoDisplay(key);
    });

    cont.appendChild(wrap);
  });
}

function recalc() {
  let integralTotal = 0; // sempre o valor do pacote integral (1º pill não-interno)
  let selectedTotal = 0; // valor do pill selecionado

  Object.keys(state).forEach(key => {
    const s = state[key];
    if (!s.checked) return;
    const [ci, ii] = key.split('-').map(Number);
    const cat = CATS[ci];

    if (cat.tipo === 'fixo') {
      const pkgs = cat.items[ii].pkgs;
      const selectedPkg = pkgs[s.pkgIdx];
      // integral = primeiro pkg não-interno
      const integralPkg = pkgs.find(p => !p.interno);
      if (selectedPkg.total != null) selectedTotal += selectedPkg.total;
      if (integralPkg && integralPkg.total != null) integralTotal += integralPkg.total;
    } else {
      const pkgs = cat.pkgs;
      const selectedPkg = pkgs[s.pkgIdx];
      const integralPkg = pkgs.find(p => !p.interno && p.parcBase != null);
      if (selectedPkg.parcBase) {
        selectedTotal += calcTotalSessoes(selectedPkg, s.sessoes).total;
      } else if (!selectedPkg.parcBase && !selectedPkg.interno) {
        // avulso — sem valor fixo, não soma
      }
      if (integralPkg) integralTotal += calcTotalSessoes(integralPkg, s.sessoes).total;
    }
  });

  const economia = integralTotal - selectedTotal;

  document.getElementById('subtotal').textContent = fmt(integralTotal);
  document.getElementById('total-final').textContent = fmt(selectedTotal > 0 ? selectedTotal : integralTotal);

  const econRow = document.getElementById('economia-row');
  if (economia > 0.01) {
    document.getElementById('economia-val').textContent = '— ' + fmt(economia);
    econRow.style.display = 'flex';
  } else {
    econRow.style.display = 'none';
  }
}

function gerarTextoWpp() {
  const cliente = document.getElementById('cliente').value || '(não informado)';
  const data_em = document.getElementById('data-emissao').value;
  const obs = document.getElementById('obs').value;

  const linhas = [];
  Object.keys(state).forEach(key => {
    const s = state[key];
    if (!s.checked) return;
    const [ci, ii] = key.split('-').map(Number);
    const cat = CATS[ci];
    const item = cat.items[ii];

    if (cat.tipo === 'fixo') {
      const pkg = item.pkgs[s.pkgIdx];
      linhas.push(`• ${item.nome} — 4 aplicações — ${fmt(pkg.total)}`);
    } else {
      const pkg = cat.pkgs[s.pkgIdx];
      if (!pkg.parcBase) {
        linhas.push(`• ${item.nome} — ${s.sessoes} sessões (a combinar)`);
      } else {
        const r = calcTotalSessoes(pkg, s.sessoes);
        linhas.push(`• ${item.nome} — ${s.sessoes} sessões · ${r.nParcelas}x ${fmt(r.parcela)} = ${fmt(r.total)}`);
      }
    }
  });

  if (!linhas.length) return null;

  const total = document.getElementById('total-final').textContent;

  let txt = `🌿 *EMAGRECENTRO*\n`;
  txt += `*Orçamento — ${data_em}*\n\n`;
  const vendedor = document.getElementById('vendedor').value;
  txt += `👤 *Cliente:* ${cliente}\n`;
  if (vendedor) txt += `🧑‍💼 *Vendedora:* ${vendedor}\n`;
  txt += `\n*Procedimentos:*\n${linhas.join('\n')}\n\n`;
  const econRow = document.getElementById('economia-row');
  const economia = econRow.style.display !== 'none' ? document.getElementById('economia-val').textContent : null;
  txt += `━━━━━━━━━━━━━━━━━\n`;
  if (economia) txt += `🎉 Economia: ${economia}\n`;
  txt += `*TOTAL: ${total}*\n`;
  txt += `━━━━━━━━━━━━━━━━━`;
  if (obs) txt += `\n\n📋 ${obs}`;
  return txt;
}

function enviarWhatsApp() {
  const txt = gerarTextoWpp();
  if (!txt) { alert('Selecione pelo menos um procedimento.'); return; }
  const contato = document.getElementById('contato').value || '';
  const numeros = contato.replace(/\D/g, '');
  const base = numeros.length >= 8 ? `https://wa.me/55${numeros}` : `https://wa.me/`;
  window.open(base + '?text=' + encodeURIComponent(txt), '_blank');
}

function abrirWhatsAppModal() {
  const txt = gerarTextoWpp();
  if (!txt) return;
  const contato = document.getElementById('contato').value || '';
  const numeros = contato.replace(/\D/g, '');
  const base = numeros.length >= 8 ? `https://wa.me/55${numeros}` : `https://wa.me/`;
  window.open(base + '?text=' + encodeURIComponent(txt), '_blank');
}

function copiarResumo() {
  const txt = document.getElementById('resumo-texto').textContent;
  navigator.clipboard.writeText(txt)
    .then(() => alert('Copiado!'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = txt; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); alert('Copiado!');
    });
}

function fecharModal() { document.getElementById('modal').classList.remove('active'); }

function limpar() {
  if (!confirm('Limpar todos os campos?')) return;
  document.querySelectorAll('.proc-check').forEach(c => c.checked = false);
  document.querySelectorAll('.sessoes-btns .sess-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === '5');
  });
  Object.keys(state).forEach(k => {
    state[k] = { checked: false, pkgIdx: 0, sessoes: 5 };
    updatePrecoDisplay(k);
  });
  document.querySelectorAll('.pkg-pill').forEach(p => {
    p.parentElement.querySelectorAll('.pkg-pill').forEach((pp, i) => pp.classList.toggle('active', i === 0));
  });
  document.querySelectorAll('.int-pill').forEach(p => p.classList.remove('active'));
  ['obs','cliente','contato'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('vendedor').value = '';
  recalc();
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) fecharModal(); });


const hoje = new Date();
document.getElementById('data-emissao').value = hoje.toLocaleDateString('pt-BR');
document.getElementById('num-orcamento').textContent = 'Nº ' + String(Math.floor(Math.random()*900)+100).padStart(4,'0');

buildList();
</script>
